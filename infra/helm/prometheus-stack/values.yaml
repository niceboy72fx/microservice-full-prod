prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.trading.local
  prometheusSpec:
    retention: 7d
    retentionSize: 8GB
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 800Mi
        cpu: 750m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 15Gi
    nodeSelector:
      role: observe
    additionalScrapeConfigs:
      - job_name: spring-boot-services
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            action: keep
            regex: "true"
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_path
            action: replace
            target_label: __metrics_path__
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2

grafana:
  enabled: true
  adminPassword: ""
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.trading.local
  persistence:
    enabled: true
    storageClassName: standard-rwo
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  nodeSelector:
    role: observe
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: Trading Platform
          type: file
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      jvm-micrometer:
        gnetId: 4701
        revision: 16
        datasource: Prometheus
      kafka-overview:
        gnetId: 7589
        revision: 5
        datasource: Prometheus
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      nodejs-overview:
        gnetId: 11159
        revision: 1
        datasource: Prometheus

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
    nodeSelector:
      role: observe

prometheusOperator:
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 200Mi
      cpu: 200m

kube-state-metrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

prometheus-node-exporter:
  resources:
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 64Mi
      cpu: 100m
