apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-kibana
  namespace: elastic
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: kibana.trading.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trading-kibana-kb-http
                port:
                  number: 5601
