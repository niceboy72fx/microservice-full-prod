
# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${spring.application.name}

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# gRPC
grpc.server.port=${GRPC_PORT:9090}
# OracleDB
spring.datasource.url=${ORACLE_JDBC_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
spring.datasource.username=${ORACLE_DB_USER:app}
spring.datasource.password=${ORACLE_DB_PASSWORD:app}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=none

# ClickHouse
clickhouse.url=${CLICKHOUSE_JDBC_URL:jdbc:clickhouse://localhost:8123/default}
clickhouse.username=${CLICKHOUSE_USER:default}
clickhouse.password=${CLICKHOUSE_PASSWORD:}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# gRPC
grpc.client.host=${GRPC_CLIENT_HOST:localhost}
grpc.client.port=${GRPC_CLIENT_PORT:50051}

# JWT/Auth
app.jwt.secret=${JWT_SECRET_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:604800}
app.auth.username=${AUTH_USERNAME:admin}
app.auth.password=${AUTH_PASSWORD:admin123}
app.auth.refresh-blacklist-prefix=${REFRESH_BLACKLIST_PREFIX:auth:refresh:blacklist:}
app.auth.topic.auth-events=${AUTH_EVENTS_TOPIC:auth-events}
app.auth.reset-token.ttl-minutes=${AUTH_RESET_TOKEN_TTL_MINUTES:15}
