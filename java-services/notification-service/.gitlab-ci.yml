stages:
  - build
  - test
  - package
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  APP_NAME: "generic-command-service"
  APP_NAMESPACE: "default"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/$APP_NAME:$IMAGE_TAG"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/

build:
  stage: build
  image: gradle:8.10.2-jdk21
  script:
    - gradle clean classes

test:
  stage: test
  image: gradle:8.10.2-jdk21
  script:
    - gradle test

package-image:
  stage: package
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_NAME" .
    - docker push "$IMAGE_NAME"
  rules:
    - if: '$CI_COMMIT_BRANCH'

deploy:
  stage: deploy
  image: bitnami/kubectl:1.31
  script:
    - kubectl config use-context "$KUBE_CONTEXT"
    - sed "s#__NAMESPACE__#$APP_NAMESPACE#g" k8s/configmap.yaml | kubectl apply -f -
    - sed "s#__IMAGE__#$IMAGE_NAME#g; s#__NAMESPACE__#$APP_NAMESPACE#g" k8s/deployment.yaml | kubectl apply -f -
    - sed "s#__NAMESPACE__#$APP_NAMESPACE#g" k8s/service.yaml | kubectl apply -f -
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
