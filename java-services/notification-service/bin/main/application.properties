# Kafka bootstrap
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Consumer baseline
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:notification-email-consumer-v1}
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.max-poll-records=${KAFKA_MAX_POLL_RECORDS:200}
spring.kafka.consumer.properties.session.timeout.ms=${KAFKA_SESSION_TIMEOUT_MS:45000}
spring.kafka.consumer.properties.heartbeat.interval.ms=${KAFKA_HEARTBEAT_INTERVAL_MS:15000}
spring.kafka.consumer.properties.max.poll.interval.ms=${KAFKA_MAX_POLL_INTERVAL_MS:300000}
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=${KAFKA_LISTENER_CONCURRENCY:6}

# Producer baseline
spring.kafka.producer.acks=all
spring.kafka.producer.retries=${KAFKA_PRODUCER_RETRIES:10}
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=${KAFKA_DELIVERY_TIMEOUT_MS:120000}
spring.kafka.producer.properties.request.timeout.ms=${KAFKA_REQUEST_TIMEOUT_MS:30000}
spring.kafka.producer.properties.linger.ms=${KAFKA_LINGER_MS:20}
spring.kafka.producer.properties.compression.type=${KAFKA_COMPRESSION_TYPE:zstd}

# Topics
app.notification.topic.main=${NOTIFICATION_TOPIC_MAIN:notification.email.v1}
app.notification.topic.retry-1m=${NOTIFICATION_TOPIC_RETRY_1M:notification.email.retry.1m.v1}
app.notification.topic.retry-5m=${NOTIFICATION_TOPIC_RETRY_5M:notification.email.retry.5m.v1}
app.notification.topic.retry-30m=${NOTIFICATION_TOPIC_RETRY_30M:notification.email.retry.30m.v1}
app.notification.topic.dlq=${NOTIFICATION_TOPIC_DLQ:notification.email.dlq.v1}
app.auth.topic.auth-events=${AUTH_EVENTS_TOPIC:auth-events}

# Retry policy
app.notification.retry.max-attempts=${NOTIFICATION_RETRY_MAX_ATTEMPTS:6}

# Virtual thread + SMTP concurrency/rate control
app.notification.smtp.max-in-flight=${SMTP_MAX_IN_FLIGHT:200}
app.notification.smtp.per-domain-rate=${SMTP_PER_DOMAIN_RATE:50}
app.notification.sse.timeout-ms=${NOTIFICATION_SSE_TIMEOUT_MS:0}
app.notification.sse.redis-channel=${NOTIFICATION_SSE_REDIS_CHANNEL:notification:sse:fanout}
app.notification.jwt.secret=${JWT_SECRET_BASE64:}

# Firebase
app.notification.firebase.enabled=${FIREBASE_ENABLED:false}
app.notification.firebase.project-id=${FIREBASE_PROJECT_ID:}
app.notification.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# gRPC
grpc.server.port=${GRPC_PORT:9090}
grpc.client.host=${GRPC_CLIENT_HOST:localhost}
grpc.client.port=${GRPC_CLIENT_PORT:50051}

# OracleDB
spring.datasource.url=${ORACLE_JDBC_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
spring.datasource.username=${ORACLE_DB_USER:app}
spring.datasource.password=${ORACLE_DB_PASSWORD:app}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=none

# ClickHouse
clickhouse.url=${CLICKHOUSE_JDBC_URL:jdbc:clickhouse://localhost:8123/default}
clickhouse.username=${CLICKHOUSE_USER:default}
clickhouse.password=${CLICKHOUSE_PASSWORD:}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
