apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-alert
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-alert
  template:
    metadata:
      labels:
        app: node-alert
    spec:
      containers:
        - name: node-alert
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
              name: node-alert-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
